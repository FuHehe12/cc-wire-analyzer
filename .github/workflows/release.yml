name: build-release

# 触发：推 v* tag → 双平台打包 + 发 GitHub Release；workflow_dispatch 做测试构建（不出 release）
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # release job 发 release 需要

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false   # 一个平台失败不影响另一个
      matrix:
        include:
          - os: windows-latest
            spec: build.spec
            extra: ''
            artifact: dist/cc-wire-analyzer-windows.exe
          - os: macos-latest
            spec: build-mac.spec
            extra: '--extra mac'   # 装 pyobjc（macOS WebKit 后端）
            artifact: dist/CCWireAnalyzer-mac.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync ${{ matrix.extra }}

      # 单 exe（260713 合并）：无参/双击开 GUI，`serve` 子命令起 headless 服务给 AI。
      # 不再单独出 CLI 二进制——AI 走 HTTP API（/api/proxy/*、/api/captures…），
      # 不需要 stdout；Windows 的 noconsole GUI exe 本来也没 stdout 可用。
      - name: Build with PyInstaller
        run: uv run pyinstaller ${{ matrix.spec }} --noconfirm --clean

      # macOS：把 .app 打成 zip（.app 是目录，artifact/release 需单文件）
      # ditto --sequesterRsrc --keepParent 保留资源分支与目录结构（普通 zip 会丢）
      - name: Zip macOS app
        if: runner.os == 'macOS'
        run: cd dist && ditto -c -k --sequesterRsrc --keepParent CCWireAnalyzer.app CCWireAnalyzer-mac.zip

      - name: Rename Windows exe
        if: runner.os == 'Windows'
        shell: bash
        run: mv dist/cc-wire-analyzer.exe dist/cc-wire-analyzer-windows.exe

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: ${{ matrix.artifact }}
          if-no-files-found: error   # 产物缺失则构建失败，不静默放过

  # 单独 release job：等两个平台都构建完，下载所有产物后一次性 attach。
  # 为什么不放每个 build job 里：两个 build job 各自 attach 时会并发写同一 release，
  # 后到的基于不完整状态更新、覆盖先到的 asset —— v0.1.0 首发就这样丢了 Windows exe。
  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout（取 CHANGELOG.md 与 tag message 做 release notes）
        uses: actions/checkout@v4
        # 不加 fetch-tags: true —— tag 触发时 checkout 本身就把触发 commit 的 SHA fetch 到
        # refs/tags/<tag>，与 fetch-tags 要拉的 annotated tag 对象同 ref 不同目标，git 直接
        # fatal "Cannot fetch both ..."（v0.3.0 首次 tag 触发实测，重试三次后 job 失败）。

      - name: Fetch annotated tag（tag message 做 fallback notes 用）
        # checkout 把 refs/tags/<tag> 指到了触发 commit（lightweight 化），%(contents) 读不到
        # annotated message —— 强制覆盖回真 tag 对象。失败不致命：还有占位 fallback 兜底。
        run: git fetch --force origin "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}" || true

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true   # 各平台 artifact 的文件合并到同一目录

      # release notes 取 CHANGELOG.md 当前 tag 段落（单一真源，已在维护、最详细）。
      # 不用 generate_release_notes：它按 PR 分组列 "What's Changed"，本项目是单人直接
      # push commit（无 PR），结果只剩一行 Full Changelog 链接，CHANGELOG 和 tag message
      # 全被忽略——v0.1.0/v0.2.0 的 release 页面即如此（260714 修）。
      - name: Build release notes from CHANGELOG
        run: |
          TAG="${GITHUB_REF_NAME}"   # 例 v0.2.0
          # 提取 "## <TAG>" 段落：跳过标题行本身，遇下一个 "## " 截止。
          # 纯字符串前缀匹配（兼容 "## v0.2.0 - 日期" 与 "## v0.1.0" 两种），免正则转义坑。
          awk -v tag="$TAG" '
            /^## / {
              if (found) exit                       # 已在记录，遇下一版本标题 → 停
              rest = substr($0, 4)                  # 去掉 "## "
              if (rest == tag || substr(rest, 1, length(tag)+1) == tag " ") found = 1
              next                                  # 标题行不进 body
            }
            found { print }
          ' CHANGELOG.md > release_notes.md
          # 三层兜底，绝不空白：
          if [ ! -s release_notes.md ]; then
            git tag -l --format='%(contents)' "$TAG" > release_notes.md   # fallback 1：tag message
          fi
          if [ ! -s release_notes.md ]; then
            echo "Release ${TAG}. See CHANGELOG.md for details." > release_notes.md   # fallback 2：占位
          fi
          echo "--- release_notes.md 首部 ---"; head -5 release_notes.md

      - name: Attach all assets to Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body_path: release_notes.md
